<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>S.U.L.A.T. SCANNER</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; padding: 10px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            -webkit-backdrop-filter: blur(15px);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px; padding: 25px;
            width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        #reader {
            width: 100%; border-radius: 20px; overflow: hidden; 
            background: #000; position: relative; min-height: 250px;
            border: 2px solid rgba(0, 210, 255, 0.3);
        }
        .status {
            margin-top: 20px; font-size: 0.9rem; font-weight: bold;
            letter-spacing: 1px; min-height: 50px; line-height: 1.4;
            color: #00d2ff; text-transform: uppercase;
        }
        .panel {
            margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }
        button {
            background: #00d2ff; border: none; padding: 15px;
            border-radius: 12px; color: #000; font-weight: 800;
            cursor: pointer; font-size: 0.8rem; transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }
        button:active { transform: scale(0.95); }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.15); color: white;
            box-shadow: none; border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .scan-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 200px; height: 200px; border: 2px solid #00d2ff;
            border-radius: 15px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.6);
            pointer-events: none; z-index: 10;
        }
        .scan-line {
            position: absolute; width: 100%; height: 2px;
            background: #00d2ff; top: 0; left: 0;
            animation: scan 2s linear infinite; box-shadow: 0 0 15px #00d2ff;
        }
        @keyframes scan {
            0% { top: 0; } 100% { top: 100%; }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h2 style="margin-bottom: 5px; letter-spacing: 5px; color: #00d2ff;">S.U.L.A.T.</h2>
        <p style="font-size: 0.7rem; opacity: 0.5; margin-bottom: 20px;">SMART LIBRARY SCANNER v1.0</p>
        
        <div id="reader">
            <div class="scan-overlay">
                <div class="scan-line"></div>
            </div>
        </div>

        <div id="status" class="status">Initializing System...</div>

        <div class="panel">
            <button class="btn-secondary" onclick="switchCamera('environment')">BACK CAM</button>
            <button class="btn-secondary" onclick="switchCamera('user')">FRONT CAM</button>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        let html5QrCode;

        // AUTOMATIC HOST DETECTION
        // Uses the same IP/Hostname used to access this page
        const API_URL = `${window.location.origin}/api/scan`;

        function onScanSuccess(decodedText, decodedResult) {
            statusEl.innerText = "Processing Scan...";
            statusEl.style.color = "#00ff88";

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ qrData: decodedText })
            })
            .then(response => {
                if(response.ok) {
                    statusEl.innerText = "SUCCESS: DATA SENT TO PC";
                    setTimeout(() => {
                        statusEl.innerText = "READY TO SCAN";
                        statusEl.style.color = "#00d2ff";
                    }, 2000);
                }
            })
            .catch(error => {
                statusEl.innerText = "CONNECTION ERROR: Check Server";
                statusEl.style.color = "#ff4444";
            });
        }

        function startScanner(cameraMode) {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    initScanner(cameraMode);
                });
            } else {
                initScanner(cameraMode);
            }
        }

        function initScanner(cameraMode) {
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 15, qrbox: { width: 200, height: 200 } };
            
            html5QrCode.start(
                { facingMode: cameraMode }, 
                config, 
                onScanSuccess
            ).catch(err => {
                statusEl.innerText = "Camera Access Denied";
                statusEl.style.color = "#ff4444";
            });
        }

        function switchCamera(mode) {
            startScanner(mode);
        }

        // Auto-start back camera on load
        window.addEventListener('load', () => {
            startScanner("environment");
        });
    </script>
</body>
</html>
